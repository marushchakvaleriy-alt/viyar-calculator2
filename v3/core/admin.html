<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Vpoint V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="sidebar">
            <div class="admin-sidebar-header">
                <div class="admin-logo">🛠️ Admin V3</div>
            </div>
            <nav class="admin-nav" id="sidebarNav">
                <div class="admin-nav-section">Групи</div>
                <!-- JS will populate -->
            </nav>
            <div style="padding: 20px;">
                <button class="btn btn-primary" style="width: 100%;" onclick="addGroup()">+ Група</button>
                <a href="../index.html" class="btn btn-ghost" style="width: 100%; margin-top: 10px;">🏠 На головну</a>
            </div>
        </aside>

        <!-- Main -->
        <main class="admin-main">
            <div class="admin-topbar">
                <div class="admin-topbar-title">
                    <select id="calcSwitcher" onchange="switchCalculator(this.value)">
                        <!-- JS will populate -->
                    </select>
                </div>
                <div class="admin-topbar-actions">
                    <span id="unsavedBadge" class="unsaved-badge hidden">⚠️ Незбережено</span>
                    <button class="btn btn-secondary" onclick="openPreview()">👁️ Перегляд</button>
                    <button class="btn btn-success" onclick="saveSchema()">💾 Зберегти</button>
                </div>
            </div>

            <div class="admin-matrix-wrap">
                <div style="overflow-x: auto;">
                    <table class="matrix-table" id="matrixTable">
                        <!-- JS will render -->
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Core Modules -->
    <script src="js/configLoader.js"></script>
    <script src="js/schemaValidator.js"></script>
    <script src="js/formulaEngine.js"></script>
    <script src="js/uiHelpers.js"></script>
    <script src="js/adminMatrix.js"></script>
    <script src="../data/config_calculators.js"></script>

    <script>
        let Schema = null;
        let currentConfigFile = null;
        let hasUnsavedChanges = false;

        // Initialize
        (async function () {
            currentConfigFile = ConfigLoader.getConfigFromURL() || '../data/schema_default.js';

            try {
                Schema = await ConfigLoader.loadSchema(currentConfigFile);
                initCalcSwitcher();
                renderSidebar();
                renderMatrix();
            } catch (err) {
                console.error('[Admin] Load error:', err);
                UIHelpers.toast('Помилка: ' + err.message, 'error');
            }
        })();

        function initCalcSwitcher() {
            const select = document.getElementById('calcSwitcher');
            const config = window.CalculatorConfig || [];

            select.innerHTML = '';
            config.forEach(calc => {
                const opt = document.createElement('option');
                opt.value = calc.file;
                opt.textContent = calc.title;
                if (calc.file === currentConfigFile.replace('../', '')) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function switchCalculator(file) {
            if (hasUnsavedChanges && !confirm('Є незбережені зміни! Продовжити?')) {
                document.getElementById('calcSwitcher').value = currentConfigFile.replace('../', '');
                return;
            }
            location.href = 'admin.html?config=' + file;
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebarNav');
            nav.innerHTML = '<div class="admin-nav-section">Групи</div>';

            (Schema?.groups || []).forEach(g => {
                const item = document.createElement('div');
                item.className = 'admin-nav-item';
                item.innerHTML = `📁 ${g.title}`;
                item.onclick = () => scrollToGroup(g.id);
                nav.appendChild(item);
            });
        }

        function renderMatrix() {
            const table = document.getElementById('matrixTable');
            if (!Schema || !table) return;

            // Use AdminMatrix module if available
            if (window.AdminMatrix && AdminMatrix.render) {
                AdminMatrix.render(table, Schema, {
                    onUpdate: () => markDirty(),
                    onSave: saveSchema
                });
            } else {
                // Fallback simple render
                table.innerHTML = `
                    <tr>
                        <th class="matrix-table th">Параметр</th>
                        ${(Schema.processes || []).slice(0, 5).map(p =>
                    `<th>${p.name}</th>`
                ).join('')}
                    </tr>
                    ${(Schema.fields || []).slice(0, 10).map(f => `
                        <tr>
                            <td>${f.label}</td>
                            ${(Schema.processes || []).slice(0, 5).map(p => `
                                <td><input class="cell-input" value="${Schema.rules?.[f.id]?.[p.id] || ''}"></td>
                            `).join('')}
                        </tr>
                    `).join('')}
                `;
            }
        }

        function scrollToGroup(id) {
            const el = document.getElementById('group-' + id);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        }

        function addGroup() {
            const name = prompt('Назва нової групи:');
            if (!name) return;

            if (!Schema.groups) Schema.groups = [];
            Schema.groups.push({ id: 'g_' + Date.now(), title: name });

            markDirty();
            renderSidebar();
            renderMatrix();
        }

        function markDirty() {
            hasUnsavedChanges = true;
            document.getElementById('unsavedBadge').classList.remove('hidden');
        }

        function markClean() {
            hasUnsavedChanges = false;
            document.getElementById('unsavedBadge').classList.add('hidden');
        }

        async function saveSchema() {
            const content = `const Schema = ${JSON.stringify(Schema, null, 4)};\nwindow.Schema = Schema;`;

            try {
                const resp = await fetch('http://localhost:5005', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: currentConfigFile.replace('../', ''), content })
                });

                if (resp.ok) {
                    markClean();
                    UIHelpers.toast('✅ Збережено!', 'success');
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                console.error('[Admin] Save error:', err);
                UIHelpers.toast('Локальний сервер не запущено', 'error');

                // Fallback: download file
                if (confirm('Завантажити файл вручну?')) {
                    const blob = new Blob([content], { type: 'text/javascript' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = currentConfigFile.split('/').pop();
                    a.click();
                }
            }
        }

        function openPreview() {
            window.open('calculator.html?config=' + currentConfigFile, '_blank');
        }

        // Warn on leave
        window.onbeforeunload = () => hasUnsavedChanges ? 'Є незбережені зміни!' : null;
    </script>
</body>

</html>
