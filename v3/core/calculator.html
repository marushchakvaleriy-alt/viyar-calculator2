<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор - Vpoint V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/calculator.css">
</head>

<body>
    <div class="calc-container">
        <div class="calc-header">
            <a href="../index.html" style="font-size: 20px; text-decoration: none;">🏠</a>
            <h1 class="calc-title" id="calcTitle">Калькулятор</h1>
        </div>

        <div class="calc-layout">
            <div class="calc-form" id="formContainer">
                <!-- JS will render form -->
            </div>

            <div class="calc-results">
                <div class="calc-results-header">
                    <h3 class="calc-results-title">Результат</h3>
                    <div class="calc-total-score" id="totalScore">0</div>
                </div>
                <div class="calc-results-body" id="productsList">
                    <div class="calc-empty">
                        <div class="calc-empty-icon">📋</div>
                        <p>Заповніть форму для розрахунку</p>
                    </div>
                </div>
                <div class="calc-categories" id="categoryBreakdown">
                    <!-- JS will render categories -->
                </div>
            </div>
        </div>
    </div>

    <!-- Core Modules -->
    <script src="js/configLoader.js"></script>
    <script src="js/schemaValidator.js"></script>
    <script src="js/formulaEngine.js"></script>
    <script src="js/uiHelpers.js"></script>
    <script src="js/calculatorEngine.js"></script>

    <script>
        // Initialize calculator
        (async function () {
            try {
                const configPath = ConfigLoader.getConfigFromURL() || '../data/schema_default.js';
                const schema = await ConfigLoader.loadSchema(configPath);

                const validation = SchemaValidator.validate(schema);
                SchemaValidator.logResult(validation);

                if (!validation.valid) {
                    document.getElementById('formContainer').innerHTML = `
                        <div class="card">
                            <div class="card-body text-center">
                                <p style="color: var(--danger)">Помилка у схемі калькулятора</p>
                                <ul style="text-align: left; color: var(--gray-500); font-size: 12px;">
                                    ${validation.errors.map(e => `<li>${e}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                    return;
                }

                document.getElementById('calcTitle').textContent = schema.meta?.title || 'Калькулятор';

                if (window.CalculatorEngine) {
                    CalculatorEngine.init(schema);
                }
            } catch (err) {
                console.error('[Calculator] Init error:', err);
                UIHelpers.toast('Помилка завантаження: ' + err.message, 'error');
            }
        })();
    </script>
</body>

</html>
