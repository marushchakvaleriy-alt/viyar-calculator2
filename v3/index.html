<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vpoint Calculator V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="core/css/common.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .calc-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .calc-card:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
        }

        .calc-card-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .calc-card-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .calc-card-desc {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .admin-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div class="hero">
        <h1 class="hero-title">Vpoint Calculator</h1>
        <p class="hero-subtitle">Виберіть калькулятор для розрахунку балів</p>
    </div>

    <div class="grid" id="calcGrid">
        <!-- JS will populate -->
    </div>

    <div class="admin-link">
        <button class="admin-btn" onclick="location.href='core/designer.html'">🎨 Дизайнер</button>
        <button class="admin-btn" onclick="showAdminAuth()">🔐 Адмін</button>
    </div>

    <script src="data/config_calculators.js"></script>
    <script src="core/js/configLoader.js"></script>
    <script>
        const grid = document.getElementById('calcGrid');

        function renderCalculators() {
            const config = window.CalculatorConfig || [];
            grid.innerHTML = '';

            if (config.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #64748b;">
                        <div style="font-size: 48px; margin-bottom: 16px;">📦</div>
                        <p>Немає калькуляторів. Додайте перший через Дизайнер.</p>
                    </div>
                `;
                return;
            }

            config.forEach(calc => {
                const card = document.createElement('div');
                card.className = 'calc-card';
                card.innerHTML = `
                    <div class="calc-card-icon">${calc.icon || '📊'}</div>
                    <div class="calc-card-title">${calc.title}</div>
                    <div class="calc-card-desc">${calc.desc || 'Натисніть для розрахунку'}</div>
                `;
                card.onclick = () => {
                    location.href = 'core/calculator.html?config=' + calc.file;
                };
                grid.appendChild(card);
            });
        }

        function showAdminAuth() {
            const pass = prompt('Введіть пароль адміністратора:');
            if (pass === '1111') {
                sessionStorage.setItem('admin', 'true');
                location.href = 'core/admin.html';
            } else if (pass) {
                alert('Невірний пароль');
            }
        }

        renderCalculators();
    </script>
</body>

</html>
